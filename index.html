<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パンチ君のタロット啓示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // 提供されたFirebaseコンフィグ
        const firebaseConfig = {
            apiKey: "AIzaSyCIfXRil7SiIyp1ym0K4mLqXcaC2wuwaYY",
            authDomain: "ichikawa-punch-tarot.firebaseapp.com",
            projectId: "ichikawa-punch-tarot",
            storageBucket: "ichikawa-punch-tarot.firebasestorage.app",
            messagingSenderId: "631798648873",
            appId: "1:631798648873:web:edb705c8fd9608bd488c38"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Sun, RotateCcw, Leaf, MessageCircle, Info, Star, Sparkles, Moon } = lucide;

        const TAROT_DECK = [
            { id: 0, name: "愚者 (The Fool)", keywordUp: "自由、型破り、無邪気", keywordRev: "軽率、無計画、現実逃避", desc: "新しい始まりや未知への冒険を示唆しています。心の赴くままに進む時期です。" },
            { id: 1, name: "魔術師 (The Magician)", keywordUp: "創造、自信、可能性", keywordRev: "スランプ、消極的、無気力", desc: "準備は整いました。あなたの持つスキルやアイデアを現実にする力が備わっています。" },
            { id: 2, name: "女教皇 (The High Priestess)", keywordUp: "直感、知性、精神性", keywordRev: "悲観、神経質、現実逃避", desc: "自分の内なる声や直感に耳を傾けてください。隠された真実が見えてくるでしょう。" },
            { id: 3, name: "女帝 (The Empress)", keywordUp: "豊穣、母性、愛情", keywordRev: "依存、嫉妬、過保護", desc: "愛と豊かさに満ちた時期です。感覚的な喜びや創造性が高まっています。" },
            { id: 4, name: "皇帝 (The Emperor)", keywordUp: "責任、リーダーシップ、安定", keywordRev: "傲慢、頑固、支配的", desc: "論理的な思考と強い意志が求められます。基盤を固め、リーダーシップを発揮する時です。" },
            { id: 5, name: "教皇 (The Hierophant)", keywordUp: "伝統、ルール、助言", keywordRev: "束縛、孤立、保守的", desc: "伝統や秩序を重んじ、信頼できる人からの助言や教えを大切にしてください。" },
            { id: 6, name: "恋人 (The Lovers)", keywordUp: "選択、調和、情熱", keywordRev: "誘惑、不和、優柔不断", desc: "重要な選択の時、あるいは深い絆や共感による調和が訪れることを示しています。" },
            { id: 7, name: "戦車 (The Chariot)", keywordUp: "勝利、前進、コントロール", keywordRev: "暴走、挫折、自己中心", desc: "困難を乗り越え、強い意志で目標に向かって前進する力がみなぎっています。" },
            { id: 8, name: "力 (Strength)", keywordUp: "忍耐、勇気、思いやり", keywordRev: "力不足、臆病、感情的", desc: "力ずくではなく、優しさと忍耐力で内なる獣（感情）をコントロールする強さです。" },
            { id: 9, name: "隠者 (The Hermit)", keywordUp: "内省、探求、単独行動", keywordRev: "孤独、閉鎖的、現実逃避", desc: "外の世界から少し離れ、自分自身の内面と深く向き合う時間が必要です。" },
            { id: 10, name: "運命の輪 (Wheel of Fortune)", keywordUp: "転機、チャンス、運命", keywordRev: "すれ違い、不運、停滞", desc: "思いがけないチャンスや、抗えない運命の流れが訪れます。変化を受け入れましょう。" },
            { id: 11, name: "正義 (Justice)", keywordUp: "バランス、公平、決断", keywordRev: "不公平、偏見、優柔不断", desc: "感情に流されず、客観的で公平な判断が求められています。因果応報の暗示も。" },
            { id: 12, name: "吊るされた男 (The Hanged Man)", keywordUp: "試練、視点の変化、自己犠牲", keywordRev: "徒労、執着、自己中心", desc: "今は身動きが取れないかもしれませんが、別の視点から物事を見るための重要な期間です。" },
            { id: 13, name: "死神 (Death)", keywordUp: "終焉、再生、リセット", keywordRev: "未練、停滞、変化への恐怖", desc: "一つの終わりと、新しい始まり。古いものを手放すことで新しい道が開かれます。" },
            { id: 14, name: "節制 (Temperance)", keywordUp: "調和、順応、浄化", keywordRev: "不均衡、浪費、無節操", desc: "異なるものをうまく混ぜ合わせ、ちょうど良いバランスと調和を見つける時です。" },
            { id: 15, name: "悪魔 (The Devil)", keywordUp: "欲望、執着、誘惑", keywordRev: "解放、回復、執着を手放す", desc: "物質的な欲望や、断ち切れない執着にとらわれていませんか？自分を見つめ直す警告です。" },
            { id: 16, name: "塔 (The Tower)", keywordUp: "崩壊、アクシデント、解放", keywordRev: "緊迫、不幸、混乱", desc: "突然のトラブルや価値観の崩壊。しかし、それは不要なものを壊すための浄化でもあります。" },
            { id: 17, name: "星 (The Star)", keywordUp: "希望、インスピレーション、理想", keywordRev: "失望、悲観、無気力", desc: "暗闇の中に輝く希望の星。インスピレーションに従い、明るい未来を信じてください。" },
            { id: 18, name: "月 (The Moon)", keywordUp: "不安、迷い、潜在意識", keywordRev: "不安の解消、現実を見る", desc: "見えないものへの不安や迷い。今は無理に動かず、直感に従いながら夜明けを待ちましょう。" },
            { id: 19, name: "太陽 (The Sun)", keywordUp: "成功、喜び、活力", keywordRev: "延期、不調、エネルギー不足", desc: "生命力に満ち溢れ、努力が実を結ぶ明るい兆し。純粋な喜びを感じてください。" },
            { id: 20, name: "審判 (Judgement)", keywordUp: "復活、覚醒、結果", keywordRev: "後悔、挫折、未練", desc: "過去の行いに対する結果が出ます。あきらめかけていたことの復活や、新たな覚醒の時。" },
            { id: 21, name: "世界 (The World)", keywordUp: "完成、成就、完全", keywordRev: "未完成、中途半端、停滞", desc: "一つのサイクルが完璧な形で完了しました。大いなる達成と、次への準備のステージです。" }
        ];

        function App() {
            const [appState, setAppState] = useState('home');
            const [drawnCards, setDrawnCards] = useState([]);
            const [flippedCards, setFlippedCards] = useState([]);

            const drawCards = (count) => {
                setAppState('drawing');
                const shuffled = [...TAROT_DECK].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, count).map(card => ({
                    ...card,
                    isReversed: Math.random() > 0.5
                }));
                
                setTimeout(() => {
                    setDrawnCards(selected);
                    setFlippedCards(new Array(count).fill(false));
                    setAppState('reading');
                }, 1500);
            };

            const handleCardClick = (index) => {
                const newFlipped = [...flippedCards];
                newFlipped[index] = true;
                setFlippedCards(newFlipped);
            };

            const resetReading = () => {
                setAppState('home');
                setDrawnCards([]);
                setFlippedCards([]);
            };

            return (
                <div className="min-h-screen bg-emerald-950 text-emerald-50 selection:bg-orange-500 selection:text-white pb-20">
                    <div className="fixed inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-emerald-800/40 via-emerald-950 to-green-950 -z-10" />
                    
                    <header className="border-b border-emerald-800/50 bg-emerald-950/90 backdrop-blur-md sticky top-0 z-50 shadow-lg">
                        <div className="max-w-5xl mx-auto px-4 py-3">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={resetReading}>
                                    <span className="text-3xl">🐒</span>
                                    <h1 className="text-xl md:text-2xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-amber-500">
                                        パンチ君のタロット啓示
                                    </h1>
                                </div>

                                <div className="flex items-center gap-2 sm:gap-4 overflow-x-auto w-full sm:w-auto justify-center">
                                    <button onClick={() => drawCards(1)} disabled={appState === 'drawing'} className="flex items-center gap-1.5 px-4 py-2 rounded-full bg-emerald-800/60 hover:bg-orange-500 border border-emerald-600/50 transition-all text-sm font-bold shadow-md">
                                        <span>🍌</span> ワンオラクル
                                    </button>
                                    <button onClick={() => drawCards(3)} disabled={appState === 'drawing'} className="flex items-center gap-1.5 px-4 py-2 rounded-full bg-emerald-800/60 hover:bg-orange-500 border border-emerald-600/50 transition-all text-sm font-bold shadow-md">
                                        <span>🍌🍌🍌</span> スリーカード
                                    </button>
                                    {appState === 'reading' && (
                                        <button onClick={resetReading} className="w-10 h-10 flex items-center justify-center rounded-full bg-emerald-900 border border-emerald-700">
                                            <RotateCcw size={20} />
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8 md:py-12 flex flex-col items-center">
                        {appState === 'home' && (
                            <div className="text-center animate-fade-in-up mt-10">
                                <div className="relative inline-block mb-8">
                                    <div className="text-8xl">🐒</div>
                                    <div className="absolute -top-4 -right-12 bg-white text-emerald-950 px-4 py-2 rounded-2xl font-bold shadow-lg animate-bounce text-sm">ウキッ！</div>
                                </div>
                                <h2 className="text-3xl md:text-4xl font-black text-orange-200 mb-6">運命のバナナを選ぶウキ！</h2>
                                <div className="bg-emerald-900/50 border border-emerald-700/50 rounded-2xl p-8 max-w-lg mx-auto shadow-inner">
                                    <p className="text-lg leading-relaxed">
                                        やあ！市川動物園の<strong className="text-orange-300">パンチ君</strong>だウキ！<br/>
                                        ボクが神秘のタロットでキミを導いてあげるよ。
                                    </p>
                                </div>
                            </div>
                        )}

                        {appState === 'drawing' && (
                            <div className="flex flex-col items-center justify-center flex-1 animate-pulse mt-20">
                                <div className="text-7xl mb-6 animate-spin">🍌</div>
                                <p className="text-2xl font-bold text-orange-200 bg-emerald-900/40 px-8 py-3 rounded-full">まぜまぜしてるウキ...</p>
                            </div>
                        )}

                        {appState === 'reading' && (
                            <div className="w-full animate-fade-in">
                                <div className="text-center mb-12">
                                    <div className="text-5xl mb-4">🐒</div>
                                    <p className="inline-block text-orange-100 font-bold text-xl bg-gradient-to-r from-orange-600 to-amber-600 px-8 py-3 rounded-full shadow-xl">
                                        {drawnCards.length === 1 ? "これがキミへの啓示だウキ！🍌" : "過去・現在・未来の啓示だウキ！🍌🍌🍌"}
                                    </p>
                                </div>

                                <div className="flex flex-wrap justify-center gap-10">
                                    {drawnCards.map((card, index) => (
                                        <div key={index} className="flex flex-col items-center w-full max-w-[280px]">
                                            <div className="mb-4 font-bold bg-emerald-900/80 px-4 py-1.5 rounded-full border border-emerald-600 text-orange-200">
                                                {drawnCards.length === 3 ? (index === 0 ? "過去" : index === 1 ? "現在" : "未来") : "結果"}
                                            </div>
                                            <div 
                                                className="relative w-56 h-[22rem] cursor-pointer [perspective:1000px]"
                                                onClick={() => handleCardClick(index)}
                                            >
                                                <div className={`w-full h-full transition-all duration-700 [transform-style:preserve-3d] ${flippedCards[index] ? '[transform:rotateY(180deg)]' : ''}`}>
                                                    <div className="absolute inset-0 rounded-2xl bg-gradient-to-br from-green-700 to-emerald-950 border-2 border-emerald-500/50 flex items-center justify-center [backface-visibility:hidden]">
                                                        <div className="w-[85%] h-[90%] border-2 border-dashed border-emerald-400/30 rounded-xl flex items-center justify-center">
                                                            <div className="text-4xl opacity-50">🌿</div>
                                                        </div>
                                                    </div>
                                                    <div className={`absolute inset-0 rounded-2xl bg-white border-[3px] border-orange-400 p-4 [backface-visibility:hidden] [transform:rotateY(180deg)] text-emerald-950 ${card.isReversed ? 'rotate-180' : ''}`}>
                                                        <div className="w-full h-full border border-emerald-100 rounded-lg flex flex-col items-center">
                                                            <div className="text-orange-600 font-black pt-2">{card.id}</div>
                                                            <div className="flex-1 flex items-center text-4xl">🔮</div>
                                                            <div className="pb-4 font-black text-center text-lg">{card.name.split(' ')[0]}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            {flippedCards[index] && (
                                                <div className="mt-8 bg-white text-emerald-950 rounded-2xl p-6 shadow-2xl border-l-[6px] border-orange-400 animate-fade-in">
                                                    <div className="flex items-center gap-2 mb-3">
                                                        <h4 className="font-black text-xl">{card.name}</h4>
                                                        <span className={`text-xs px-2 py-0.5 rounded font-bold ${card.isReversed ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                            {card.isReversed ? '逆位置' : '正位置'}
                                                        </span>
                                                    </div>
                                                    <p className="text-sm font-bold text-orange-700 bg-orange-50 p-2 rounded mb-3">
                                                        {card.isReversed ? card.keywordRev : card.keywordUp}
                                                    </p>
                                                    <p className="text-sm leading-relaxed font-medium">{card.desc}</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
